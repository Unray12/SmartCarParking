services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-smartparking}
    volumes:
      # Data thật của Postgres nằm ở thư mục host này -> build/rebuild container
      # mới vẫn giữ nguyên toàn bộ DB.
      - ${POSTGRES_DATA_DIR:-./backend/data/postgres}:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-smartparking}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Media server: nhận RTSP từ camera, đóng gói lại thành WebRTC (KHÔNG re-encode) cho
  # browser xem trễ thấp; đồng thời phát lại RTSP nội bộ cho AI worker + fallback JPEG của
  # backend. Path (cam<id>) do backend tự thêm/xoá động qua Control API - xem services/mediamtx.py.
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    environment:
      # Quảng bá host thật trong ICE candidate để browser (kể cả máy khác trong LAN) kết nối
      # được UDP. PHẢI là IP LAN của máy chạy Docker khi xem từ máy khác (xem .env).
      MTX_WEBRTCADDITIONALHOSTS: ${MEDIAMTX_WEBRTC_HOST:-127.0.0.1}
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    ports:
      # WHEP signaling (HTTP) - browser POST SDP offer tới đây.
      - "${MEDIAMTX_WEBRTC_PORT:-8889}:8889"
      # ICE/UDP mux - media WebRTC thật đi qua cổng này (browser <-> MediaMTX trực tiếp).
      - "${MEDIAMTX_WEBRTC_UDP_PORT:-8189}:8189/udp"
      # LƯU Ý: KHÔNG map cổng 9997 (Control API) ra host - chỉ backend trong docker network
      # được phép quản lý path. Cổng 8554 (RTSP re-publish) cũng chỉ dùng nội bộ.

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mediamtx:
        condition: service_started
    # Nạp TOÀN BỘ biến trong .env (root) thẳng vào container lúc chạy - không
    # build/bake vào image, không đụng backend/.env. Đây là nguồn config DUY NHẤT
    # cho app khi chạy qua Docker (xem backend/app/core/config.py để đối chiếu tên biến).
    env_file:
      - .env
    environment:
      # DATABASE_URL phải ghép ở đây (không đặt thẳng trong .env) vì cần đúng
      # hostname "db" theo network của Compose, khác với backend/.env dùng "localhost".
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@db:5432/${POSTGRES_DB:-smartparking}
      # LOG_DIR đã set sẵn trong Dockerfile, trỏ đúng vào volume log bên dưới.
    volumes:
      # Toàn bộ data persist gom vào backend/data/ trên host. Container path khớp
      # với AI_MODELS_DIR/SNAPSHOT_STORE_DIR trong .env (data/snapshots_store,
      # data/models_store, tương đối theo backend root = /app/backend).
      - ${SNAPSHOTS_DIR:-./backend/data/snapshots_store}:/app/backend/data/snapshots_store
      - ${MODELS_DIR:-./backend/data/models_store}:/app/backend/data/models_store
      # Log của backend (stdout được tee ra file trong này).
      - ${LOGS_DIR:-./backend/data/logs}:/data/logs
    ports:
      - "${BACKEND_PORT:-8010}:8010"
    # Passthrough đầu đọc RFID USB - CHỈ hoạt động trên Linux host có thiết bị thật.
    # Bỏ comment khi chạy qua Docker (nếu chạy bare-metal/uvicorn trực tiếp thì
    # không cần, container không liên quan). Kiểm tra đúng path thật bằng
    # `ls /dev/tty*` trên host trước khi bật - board USB native (YoloUNO/ESP32-S3)
    # thường là /dev/ttyACM0, board qua chip cầu USB-serial thường là /dev/ttyUSB0.
    # Nhiều bãi xe = nhiều đầu đọc = liệt kê MỖI cổng 1 dòng (path trong container PHẢI
    # khớp đúng với cổng đã gán cho từng bãi ở form Tạo/Sửa bãi xe trên UI).
    # devices:
    #   - "/dev/ttyACM0:/dev/ttyACM0"
    #   - "/dev/ttyACM1:/dev/ttyACM1"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
