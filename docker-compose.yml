services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-smartparking}
    volumes:
      # Data thật của Postgres nằm ở thư mục host này -> build/rebuild container
      # mới vẫn giữ nguyên toàn bộ DB.
      - ${POSTGRES_DATA_DIR:-./backend/data/postgres}:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-smartparking}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Nạp TOÀN BỘ biến trong .env (root) thẳng vào container lúc chạy - không
    # build/bake vào image, không đụng backend/.env. Đây là nguồn config DUY NHẤT
    # cho app khi chạy qua Docker (xem backend/app/core/config.py để đối chiếu tên biến).
    env_file:
      - .env
    environment:
      # DATABASE_URL phải ghép ở đây (không đặt thẳng trong .env) vì cần đúng
      # hostname "db" theo network của Compose, khác với backend/.env dùng "localhost".
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@db:5432/${POSTGRES_DB:-smartparking}
      # LOG_DIR đã set sẵn trong Dockerfile, trỏ đúng vào volume log bên dưới.
    volumes:
      # Toàn bộ data persist gom vào backend/data/ trên host. Container path khớp
      # với AI_MODELS_DIR/SNAPSHOT_STORE_DIR trong .env (data/snapshots_store,
      # data/models_store, tương đối theo backend root = /app/backend).
      - ${SNAPSHOTS_DIR:-./backend/data/snapshots_store}:/app/backend/data/snapshots_store
      - ${MODELS_DIR:-./backend/data/models_store}:/app/backend/data/models_store
      # Log của backend (stdout được tee ra file trong này).
      - ${LOGS_DIR:-./backend/data/logs}:/data/logs
    ports:
      - "${BACKEND_PORT:-8010}:8010"
    # Passthrough đầu đọc RFID USB - CHỈ hoạt động trên Linux host có thiết bị thật.
    # Bỏ comment và sửa đúng path khi deploy lên máy có gắn RFID USB.
    # devices:
    #   - "/dev/ttyUSB0:/dev/ttyUSB0"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
