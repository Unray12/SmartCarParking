services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-smartparking}
    volumes:
      # Data thật của Postgres nằm ở thư mục host này -> build/rebuild container
      # mới vẫn giữ nguyên toàn bộ DB.
      - ${POSTGRES_DATA_DIR:-./backend/data/postgres}:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-smartparking}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@localhost:5432/${POSTGRES_DB:-smartparking}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_long_random_string}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      RFID_USB_ENABLED: ${RFID_USB_ENABLED:-false}
      RFID_USB_PORT: ${RFID_USB_PORT:-/dev/ttyUSB0}
      # LOG_DIR đã set sẵn trong Dockerfile, trỏ đúng vào volume log bên dưới.
    volumes:
      # Ảnh chụp lúc vào/ra - mount thẳng vào đúng thư mục "snapshots_store" mà
      # app dùng theo default (giống hệt tên khi chạy không-Docker). Đường dẫn/
      # metadata của ảnh vẫn nằm trong bảng parking_sessions ở Postgres.
      - ${SNAPSHOTS_DIR:-./backend/snapshots_store}:/app/backend/snapshots_store
      # Model AI người dùng upload qua "AI Center" - cùng tên "models_store" như default của app.
      - ${MODELS_DIR:-./backend/models_store}:/app/backend/models_store
      # Log của backend (stdout được tee ra file trong này).
      - ${LOGS_DIR:-./backend/data/logs}:/data/logs
    ports:
      - "${BACKEND_PORT:-8010}:8010"
    # Passthrough đầu đọc RFID USB - CHỈ hoạt động trên Linux host có thiết bị thật.
    # Bỏ comment và sửa đúng path khi deploy lên máy có gắn RFID USB.
    # devices:
    #   - "/dev/ttyUSB0:/dev/ttyUSB0"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
