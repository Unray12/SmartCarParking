services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-smartparking}
    volumes:
      # Data thật của Postgres nằm ở thư mục host này -> build/rebuild container
      # mới vẫn giữ nguyên toàn bộ DB.
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-smartparking}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@db:5432/${POSTGRES_DB:-smartparking}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_long_random_string}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      RFID_USB_ENABLED: ${RFID_USB_ENABLED:-false}
      RFID_USB_PORT: ${RFID_USB_PORT:-/dev/ttyUSB0}
      # SNAPSHOT_STORE_DIR / AI_MODELS_DIR / LOG_DIR đã set sẵn trong Dockerfile,
      # trỏ đúng vào các volume mount bên dưới -> không cần khai lại ở đây.
    volumes:
      # Ảnh chụp lúc vào/ra (chỉ ảnh thật; đường dẫn/metadata của ảnh vẫn nằm
      # trong bảng parking_sessions ở Postgres, không nhân đôi dữ liệu).
      - ${SNAPSHOTS_DIR:-./data/snapshots}:/data/snapshots
      # Model AI người dùng upload qua "AI Center".
      - ${MODELS_DIR:-./data/models}:/data/models
      # Log của backend (stdout được tee ra file trong này).
      - ${LOGS_DIR:-./data/logs}:/data/logs
    ports:
      - "${BACKEND_PORT:-8010}:8010"
    # Passthrough đầu đọc RFID USB - CHỈ hoạt động trên Linux host có thiết bị thật.
    # Bỏ comment và sửa đúng path khi deploy lên máy có gắn RFID USB.
    # devices:
    #   - "/dev/ttyUSB0:/dev/ttyUSB0"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
