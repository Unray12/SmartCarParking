server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Toàn bộ frontend chỉ là HTML/CSS/JS tĩnh (không có ảnh/asset lớn nào - snapshot ảnh
    # được backend serve riêng ở cổng 8010, không qua nginx này). Không cache gì cả -
    # buộc trình duyệt luôn hỏi lại server, tránh tình trạng sau khi rebuild container với
    # code mới mà người dùng vẫn thấy bản cũ (phải hard-refresh) do browser cache mặc định.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
